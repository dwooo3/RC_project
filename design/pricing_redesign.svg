<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" font-family="'SF Pro Display','SF Pro Text',-apple-system,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0A12"/>
      <stop offset="0.5" stop-color="#0E0C16"/>
      <stop offset="1" stop-color="#0A0E14"/>
    </linearGradient>
    <linearGradient id="winbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16181F"/>
      <stop offset="1" stop-color="#101218"/>
    </linearGradient>
    <linearGradient id="glassHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.02"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0936B"/>
      <stop offset="1" stop-color="#D9633F"/>
    </linearGradient>
    <linearGradient id="accentGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E08464" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#E08464" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5BE3B0" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#5BE3B0" stop-opacity="0"/>
    </linearGradient>
    <filter id="blob" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="120"/>
    </filter>
    <filter id="winShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="30" stdDeviation="45" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <clipPath id="winClip"><rect x="40" y="32" width="1360" height="836" rx="28"/></clipPath>
  </defs>

  <!-- ===== wallpaper ===== -->
  <rect width="1440" height="900" fill="url(#wall)"/>
  <circle cx="240" cy="180" r="240" fill="#4A2DB0" opacity="0.55" filter="url(#blob)"/>
  <circle cx="1280" cy="160" r="220" fill="#B23A7E" opacity="0.45" filter="url(#blob)"/>
  <circle cx="1180" cy="820" r="260" fill="#1F8FA6" opacity="0.45" filter="url(#blob)"/>
  <circle cx="360" cy="860" r="220" fill="#D9633F" opacity="0.38" filter="url(#blob)"/>

  <!-- ===== window ===== -->
  <g filter="url(#winShadow)">
    <rect x="40" y="32" width="1360" height="836" rx="28" fill="url(#winbg)"/>
  </g>
  <g clip-path="url(#winClip)">
    <!-- subtle inner top sheen -->
    <rect x="40" y="32" width="1360" height="120" fill="url(#glassHi)"/>

    <!-- ===== title bar ===== -->
    <circle cx="74" cy="60" r="6.5" fill="#FF5F57"/>
    <circle cx="96" cy="60" r="6.5" fill="#FEBC2E"/>
    <circle cx="118" cy="60" r="6.5" fill="#28C840"/>
    <text x="720" y="65" fill="#8A93A3" font-size="13" font-weight="500" text-anchor="middle">RiskCalc</text>

    <!-- ===== sidebar ===== -->
    <rect x="40" y="84" width="248" height="784" fill="#FFFFFF" opacity="0.025"/>
    <rect x="287" y="84" width="1" height="784" fill="#FFFFFF" opacity="0.06"/>
    <!-- brand -->
    <rect x="60" y="108" width="26" height="26" rx="8" fill="url(#accent)"/>
    <text x="76" y="126" fill="#0B0A12" font-size="15" font-weight="800" text-anchor="middle">R</text>
    <text x="98" y="127" fill="#F2F4F7" font-size="17" font-weight="700">RiskCalc</text>

    <!-- nav -->
    <g font-size="13.5" font-weight="500" fill="#9AA3B2">
      <!-- Dashboard -->
      <rect x="76" y="172" width="14" height="14" rx="3" fill="none" stroke="#9AA3B2" stroke-width="1.4"/>
      <text x="106" y="184">Dashboard</text>
      <!-- Markets -->
      <path d="M77 222 l4 -6 l4 4 l5 -8" fill="none" stroke="#9AA3B2" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="106" y="224">Markets</text>
      <!-- Pricing (active) -->
      <rect x="60" y="244" width="216" height="40" rx="12" fill="#FFFFFF" opacity="0.07"/>
      <rect x="60" y="248" width="3" height="32" rx="1.5" fill="url(#accent)"/>
      <path d="M77 264 l7 -7 h6 v6 l-7 7 z" fill="none" stroke="#F0936B" stroke-width="1.5" stroke-linejoin="round"/>
      <text x="106" y="270" fill="#F4F6F9" font-weight="700">Pricing</text>
      <!-- Portfolio -->
      <path d="M77 314 h13 M77 318 h13 M77 322 h13" stroke="#9AA3B2" stroke-width="1.4" stroke-linecap="round"/>
      <text x="106" y="324">Portfolio</text>
      <!-- Risk -->
      <path d="M84 354 l7 12 h-14 z" fill="none" stroke="#9AA3B2" stroke-width="1.4" stroke-linejoin="round"/>
      <text x="106" y="364">Risk</text>
      <!-- Governance -->
      <circle cx="84" cy="402" r="7" fill="none" stroke="#9AA3B2" stroke-width="1.4"/>
      <path d="M81 402 l2 2 l4 -4" fill="none" stroke="#9AA3B2" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="106" y="404">Governance</text>
      <!-- Analytics -->
      <path d="M78 446 v-10 M84 446 v-16 M90 446 v-6" stroke="#9AA3B2" stroke-width="1.6" stroke-linecap="round"/>
      <text x="106" y="444">Analytics</text>
    </g>
    <!-- settings bottom -->
    <circle cx="84" cy="828" r="7" fill="none" stroke="#7C8696" stroke-width="1.4"/>
    <circle cx="84" cy="828" r="2.2" fill="#7C8696"/>
    <text x="106" y="833" fill="#7C8696" font-size="13.5">Settings</text>

    <!-- ===== main header ===== -->
    <text x="320" y="128" fill="#F4F6F9" font-size="28" font-weight="700">Pricing</text>
    <text x="320" y="152" fill="#7C8696" font-size="13">Value any instrument · review sensitivities · add to portfolio</text>
    <!-- search pill -->
    <rect x="1120" y="104" width="200" height="34" rx="17" fill="#FFFFFF" opacity="0.05"/>
    <circle cx="1142" cy="121" r="5.5" fill="none" stroke="#8A93A3" stroke-width="1.4"/>
    <line x1="1146" y1="125" x2="1150" y2="129" stroke="#8A93A3" stroke-width="1.4" stroke-linecap="round"/>
    <text x="1160" y="125" fill="#7C8696" font-size="12.5">Search  ⌘K</text>
    <!-- live segmented -->
    <rect x="1010" y="104" width="96" height="34" rx="17" fill="#FFFFFF" opacity="0.05"/>
    <rect x="1014" y="108" width="46" height="26" rx="13" fill="#1E2530"/>
    <text x="1037" y="125" fill="#7C8696" font-size="12" text-anchor="middle">Demo</text>
    <text x="1083" y="125" fill="#5BE3B0" font-size="12" text-anchor="middle">Live</text>

    <!-- ===== category segmented control ===== -->
    <rect x="320" y="178" width="722" height="40" rx="20" fill="#FFFFFF" opacity="0.045"/>
    <rect x="324" y="182" width="140" height="32" rx="16" fill="url(#accent)"/>
    <g font-size="13" font-weight="600">
      <text x="394" y="203" fill="#16110D" text-anchor="middle">Fixed Income</text>
      <text x="506" y="203" fill="#9AA3B2" text-anchor="middle">Options</text>
      <text x="592" y="203" fill="#9AA3B2" text-anchor="middle">Equity</text>
      <text x="654" y="203" fill="#9AA3B2" text-anchor="middle">FX</text>
      <text x="720" y="203" fill="#9AA3B2" text-anchor="middle">Swaps</text>
      <text x="820" y="203" fill="#9AA3B2" text-anchor="middle">Structured</text>
      <text x="930" y="203" fill="#9AA3B2" text-anchor="middle">Credit</text>
    </g>

    <!-- instrument dropdown -->
    <text x="320" y="252" fill="#7C8696" font-size="11" letter-spacing="1.5">INSTRUMENT</text>
    <rect x="320" y="262" width="340" height="46" rx="14" fill="#FFFFFF" opacity="0.05"/>
    <rect x="320" y="262" width="340" height="46" rx="14" fill="none" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <text x="340" y="290" fill="#F2F4F7" font-size="16" font-weight="600">Bond / OFZ</text>
    <path d="M632 285 l6 6 l6 -6" fill="none" stroke="#8A93A3" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- ===== INPUT CARD ===== -->
    <g filter="url(#cardShadow)">
      <rect x="320" y="330" width="400" height="498" rx="20" fill="#1B1E26"/>
    </g>
    <rect x="320" y="330" width="400" height="498" rx="20" fill="url(#glassHi)"/>
    <rect x="320" y="330" width="400" height="498" rx="20" fill="none" stroke="#FFFFFF" stroke-opacity="0.07"/>
    <text x="344" y="366" fill="#C6CDD8" font-size="14" font-weight="600">Parameters</text>

    <!-- input rows -->
    <g>
      <!-- Face -->
      <text x="344" y="400" fill="#7C8696" font-size="11">Face value</text>
      <rect x="344" y="408" width="352" height="40" rx="11" fill="#FFFFFF" opacity="0.04"/>
      <text x="360" y="433" fill="#F2F4F7" font-size="14" font-weight="500">1 000.00</text>
      <!-- Coupon + Freq row -->
      <text x="344" y="476" fill="#7C8696" font-size="11">Coupon</text>
      <rect x="344" y="484" width="168" height="40" rx="11" fill="#FFFFFF" opacity="0.04"/>
      <text x="360" y="509" fill="#F2F4F7" font-size="14" font-weight="500">7.00 %</text>
      <text x="528" y="476" fill="#7C8696" font-size="11">Freq / yr</text>
      <rect x="528" y="484" width="168" height="40" rx="11" fill="#FFFFFF" opacity="0.04"/>
      <text x="544" y="509" fill="#F2F4F7" font-size="14" font-weight="500">2</text>
      <!-- Maturity + rate -->
      <text x="344" y="552" fill="#7C8696" font-size="11">Maturity (y)</text>
      <rect x="344" y="560" width="168" height="40" rx="11" fill="#FFFFFF" opacity="0.04"/>
      <text x="360" y="585" fill="#F2F4F7" font-size="14" font-weight="500">10</text>
      <text x="528" y="552" fill="#7C8696" font-size="11">Flat rate</text>
      <rect x="528" y="560" width="168" height="40" rx="11" fill="#FFFFFF" opacity="0.04"/>
      <text x="544" y="585" fill="#F2F4F7" font-size="14" font-weight="500">12.00 %</text>
      <!-- Day count -->
      <text x="344" y="628" fill="#7C8696" font-size="11">Day count</text>
      <rect x="344" y="636" width="352" height="40" rx="11" fill="#FFFFFF" opacity="0.04"/>
      <text x="360" y="661" fill="#F2F4F7" font-size="14" font-weight="500">ACT / 365</text>
      <path d="M668 653 l6 6 l6 -6" fill="none" stroke="#8A93A3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Discount curve -->
      <text x="344" y="704" fill="#7C8696" font-size="11">Discount curve</text>
      <rect x="344" y="712" width="352" height="40" rx="11" fill="#FFFFFF" opacity="0.04"/>
      <text x="360" y="737" fill="#F2F4F7" font-size="14" font-weight="500">GCURVE_RUB · flat</text>
      <path d="M668 729 l6 6 l6 -6" fill="none" stroke="#8A93A3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- calculate -->
    <rect x="344" y="776" width="352" height="44" rx="13" fill="url(#accent)"/>
    <text x="520" y="803" fill="#16110D" font-size="14.5" font-weight="700" text-anchor="middle">Calculate valuation</text>

    <!-- ===== RESULT CARD ===== -->
    <g filter="url(#cardShadow)">
      <rect x="740" y="330" width="620" height="498" rx="20" fill="#1B1E26"/>
    </g>
    <rect x="740" y="330" width="620" height="160" rx="20" fill="url(#accentGlow)"/>
    <rect x="740" y="330" width="620" height="498" rx="20" fill="url(#glassHi)"/>
    <rect x="740" y="330" width="620" height="498" rx="20" fill="none" stroke="#FFFFFF" stroke-opacity="0.07"/>

    <text x="764" y="368" fill="#7C8696" font-size="11" letter-spacing="1.5">VALUATION</text>
    <!-- status pills -->
    <rect x="1140" y="352" width="118" height="24" rx="12" fill="#FFD60A" opacity="0.12"/>
    <circle cx="1158" cy="364" r="3" fill="#FFD60A"/>
    <text x="1170" y="368" fill="#FFD60A" font-size="11.5" font-weight="600">Approximation</text>
    <rect x="1266" y="352" width="78" height="24" rx="12" fill="#5BE3B0" opacity="0.12"/>
    <circle cx="1283" cy="364" r="3" fill="#5BE3B0"/>
    <text x="1294" y="368" fill="#5BE3B0" font-size="11.5" font-weight="600">MOEX OK</text>

    <text x="762" y="430" fill="#F4F6F9" font-size="56" font-weight="700" font-family="'SF Pro Display',-apple-system,sans-serif">799.39</text>
    <text x="762" y="458" fill="#7C8696" font-size="12">model fixed_bond v0.1  ·  snapshot moex-2026-06-02  ·  audit a3f9c1</text>
    <rect x="762" y="478" width="576" height="1" fill="#FFFFFF" opacity="0.07"/>

    <!-- stat tiles -->
    <g>
      <rect x="762" y="496" width="138" height="84" rx="14" fill="#FFFFFF" opacity="0.04"/>
      <text x="778" y="522" fill="#7C8696" font-size="11">YTM</text>
      <text x="778" y="556" fill="#F2F4F7" font-size="24" font-weight="700">11.63%</text>

      <rect x="908" y="496" width="138" height="84" rx="14" fill="#FFFFFF" opacity="0.04"/>
      <text x="924" y="522" fill="#7C8696" font-size="11">Mod. duration</text>
      <text x="924" y="556" fill="#F2F4F7" font-size="24" font-weight="700">6.42</text>

      <rect x="1054" y="496" width="138" height="84" rx="14" fill="#FFFFFF" opacity="0.04"/>
      <text x="1070" y="522" fill="#7C8696" font-size="11">DV01</text>
      <text x="1070" y="556" fill="#F2F4F7" font-size="24" font-weight="700">0.62</text>

      <rect x="1200" y="496" width="138" height="84" rx="14" fill="#FFFFFF" opacity="0.04"/>
      <text x="1216" y="522" fill="#7C8696" font-size="11">Convexity</text>
      <text x="1216" y="556" fill="#F2F4F7" font-size="24" font-weight="700">51.2</text>
    </g>

    <!-- key-rate / curve sparkline -->
    <text x="762" y="616" fill="#7C8696" font-size="11" letter-spacing="1">KEY-RATE DV01</text>
    <g>
      <path d="M762 700 C 820 690, 880 672, 940 656 S 1080 632, 1160 642 S 1300 668, 1338 676"
            fill="none" stroke="#5BE3B0" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M762 700 C 820 690, 880 672, 940 656 S 1080 632, 1160 642 S 1300 668, 1338 676 L 1338 720 L 762 720 Z"
            fill="url(#spark)"/>
      <g fill="#5BE3B0">
        <circle cx="762" cy="700" r="3"/><circle cx="940" cy="656" r="3"/>
        <circle cx="1160" cy="642" r="3"/><circle cx="1338" cy="676" r="3"/>
      </g>
      <g fill="#6B7484" font-size="10">
        <text x="762" y="736">1y</text><text x="936" y="736">5y</text>
        <text x="1152" y="736">10y</text><text x="1322" y="736">20y</text>
      </g>
    </g>

    <!-- warning + CTA -->
    <rect x="762" y="756" width="576" height="48" rx="13" fill="#FFD60A" opacity="0.08"/>
    <text x="782" y="785" fill="#E9C84A" font-size="12">⚠  Demo / manual market data — not production-validated.</text>

  </g>

  <!-- caption outside window -->
  <text x="720" y="892" fill="#5A6373" font-size="12" text-anchor="middle">RiskCalc · Pricing — concept redesign (Liquid Glass, macOS 2026)</text>
</svg>
