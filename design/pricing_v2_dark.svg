<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" font-family="'SF Pro Display','SF Pro Text',-apple-system,'Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0A12"/><stop offset="0.5" stop-color="#0E0C16"/><stop offset="1" stop-color="#0A0E14"/>
    </linearGradient>
    <linearGradient id="winbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16181F"/><stop offset="1" stop-color="#101218"/>
    </linearGradient>
    <linearGradient id="glassHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.12"/><stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0.02"/><stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sideGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.13"/><stop offset="1" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0936B"/><stop offset="1" stop-color="#D9633F"/>
    </linearGradient>
    <linearGradient id="accentGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E08464" stop-opacity="0.20"/><stop offset="1" stop-color="#E08464" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5BE3B0" stop-opacity="0.30"/><stop offset="1" stop-color="#5BE3B0" stop-opacity="0"/>
    </linearGradient>
    <filter id="blob" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="120"/></filter>
    <filter id="winShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="30" stdDeviation="45" flood-color="#000" flood-opacity="0.55"/></filter>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/></filter>
    <clipPath id="winClip"><rect x="40" y="32" width="1360" height="836" rx="28"/></clipPath>
  </defs>

  <rect width="1440" height="900" fill="url(#wall)"/>
  <circle cx="240" cy="180" r="240" fill="#4A2DB0" opacity="0.55" filter="url(#blob)"/>
  <circle cx="1280" cy="160" r="220" fill="#B23A7E" opacity="0.45" filter="url(#blob)"/>
  <circle cx="1180" cy="820" r="260" fill="#1F8FA6" opacity="0.45" filter="url(#blob)"/>
  <circle cx="360" cy="860" r="220" fill="#D9633F" opacity="0.38" filter="url(#blob)"/>

