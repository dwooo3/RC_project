<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="-apple-system, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- ===== base ===== -->
  <rect width="1280" height="800" fill="#14171C"/>

  <!-- ===== topbar ===== -->
  <rect x="0" y="0" width="1280" height="44" fill="#0F1216"/>
  <rect x="0" y="43" width="1280" height="1" fill="#252C34"/>
  <text x="20" y="28" fill="#F2F4F7" font-size="15" font-weight="700">RiskCalc</text>
  <!-- status chips -->
  <rect x="930" y="13" width="78" height="20" rx="4" fill="#14231B" stroke="#246030"/>
  <text x="969" y="27" fill="#30D158" font-size="11" text-anchor="middle">■ MOEX</text>
  <rect x="1016" y="13" width="128" height="20" rx="4" fill="#202630" stroke="#2A313A"/>
  <text x="1080" y="27" fill="#B8C0CC" font-size="11" text-anchor="middle">EOD 2026-06-02</text>
  <text x="1162" y="28" fill="#7C8796" font-size="13">⌘K</text>
  <text x="1200" y="28" fill="#7C8796" font-size="13">◐</text>
  <text x="1238" y="28" fill="#7C8796" font-size="13">⚙</text>

  <!-- ===== sidebar ===== -->
  <rect x="0" y="44" width="190" height="756" fill="#0F1216"/>
  <rect x="189" y="44" width="1" height="756" fill="#252C34"/>
  <!-- nav items -->
  <g font-size="13">
    <text x="24" y="86"  fill="#B8C0CC">Dashboard</text>
    <text x="24" y="120" fill="#B8C0CC">Market</text>
    <!-- active: Pricing -->
    <rect x="8" y="132" width="174" height="30" rx="5" fill="#3A251C"/>
    <rect x="8" y="132" width="3" height="30" rx="1.5" fill="#D97757"/>
    <text x="24" y="152" fill="#F2F4F7" font-weight="600">Pricing</text>
    <text x="24" y="188" fill="#B8C0CC">Portfolio</text>
    <text x="24" y="222" fill="#B8C0CC">Risk</text>
    <text x="24" y="256" fill="#B8C0CC">Governance</text>
    <text x="24" y="290" fill="#B8C0CC">Analytics</text>
    <text x="24" y="324" fill="#B8C0CC">Settings</text>
  </g>

  <!-- ===== workspace header ===== -->
  <text x="210" y="80" fill="#F2F4F7" font-size="20" font-weight="700">Pricing</text>
  <text x="210" y="102" fill="#7C8796" font-size="12">Value any instrument, view sensitivities, add it to the portfolio</text>
  <rect x="1180" y="64" width="64" height="22" rx="4" fill="#2A2115" stroke="#604820"/>
  <text x="1212" y="79" fill="#FFD60A" font-size="11" text-anchor="middle">■ DEMO</text>

  <!-- ===== category tabs ===== -->
  <g font-size="12">
    <rect x="210" y="118" width="100" height="28" rx="4" fill="#1D2229" stroke="#D06A44"/>
    <text x="260" y="136" fill="#F2F4F7" text-anchor="middle">Fixed Income</text>
    <text x="338" y="136" fill="#7C8796" text-anchor="middle">Option</text>
    <text x="408" y="136" fill="#7C8796" text-anchor="middle">Equity</text>
    <text x="462" y="136" fill="#7C8796" text-anchor="middle">FX</text>
    <text x="520" y="136" fill="#7C8796" text-anchor="middle">Swaps</text>
    <text x="600" y="136" fill="#7C8796" text-anchor="middle">Structured</text>
    <text x="676" y="136" fill="#7C8796" text-anchor="middle">Credit</text>
  </g>
  <rect x="210" y="154" width="1054" height="1" fill="#252C34"/>

  <!-- ===== instrument dropdown ===== -->
  <text x="210" y="186" fill="#7C8796" font-size="11">INSTRUMENT</text>
  <rect x="294" y="172" width="280" height="28" rx="4" fill="#1D2229" stroke="#2A313A"/>
  <text x="308" y="190" fill="#F2F4F7" font-size="12">Bond / OFZ</text>
  <text x="556" y="190" fill="#7C8796" font-size="11">▼</text>

