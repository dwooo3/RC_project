name: nightly-smoke

# Structural smoke test of the live MOEX ISS / CBR endpoints the ingest depends
# on (Stage II.3). Catches upstream API changes before they break an EOD run.
# Network-tolerant: a geo-blocked runner reports SKIPPED, not failure.

on:
  schedule:
    - cron: '0 18 * * 1-5'      # ~21:00 MSK on weekdays (after the MOEX close)
  workflow_dispatch:            # allow manual runs

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Probe ISS / CBR structure
        run: python scripts/smoke_iss.py
